{{#each groups}}
<div class="r-flex image-position{{key1}}" data-key1="{{key1}}">
	{{#each items}}
	<div class="r-img{{#unless blank}} r-img-i{{index}}{{/unless}} image-position{{key1}}-{{key2}}{{#if folder}} folder{{/if}}{{#if blank}} blank{{/if}}" data-key1="{{key1}}" data-key2="{{key2}}">
		{{#if folder}}
		<div class="r-folder" onclick="reading.progress.save(); dom.openComic(true, '{{chain 'escapeBackSlash' 'escapeQuotesSimples' fristImage}}', '{{chain 'escapeBackSlash' 'escapeQuotesSimples' mainPath}}')">
			<div>
				<div class="r-folder-img material-icon">folder</div>	
				<div class="r-folder-name">{{name}}</div>
			</div>	
		</div>
		{{else if blank}}
		<div>
			<div class="blank-page" data-index="{{index}}" data-auto="{{int auto}}"></div>
		</div>
		{{else}}
		<oc-img>
			{{#if canvas}}
			<img data-width="{{size.width}}" data-height="{{size.height}}" data-src="{{image}}" data-path="{{path}}" data-index="{{index}}" data-name="{{name}}" decoding="async">
			{{else if ebook}}
			<!-- <iframe> -->
			{{else}}
			<img data-src="{{image}}" data-path="{{path}}" data-index="{{index}}" decoding="async">
			{{/if}}
		</oc-img>
		{{/if}}
	</div>
	{{/each}}
</div>
{{/each}}
